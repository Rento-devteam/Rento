name: CI/CD

on:
  push:
    branches: [main, develop, deploy]
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rento_ci?schema=public

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Prisma 7.x pulls @prisma/streams-local (engines: node >=22)
          node-version: '22'

      - name: Install shared dependencies
        working-directory: packages/shared
        run: npm install --no-package-lock

      - name: Build shared
        working-directory: packages/shared
        run: npm run build

      - name: Install frontend dependencies
        working-directory: packages/frontend
        run: npm install --no-package-lock

      - name: Frontend lint
        working-directory: packages/frontend
        run: npm run lint

      - name: Frontend test
        working-directory: packages/frontend
        run: npm test

      - name: Frontend build
        working-directory: packages/frontend
        run: npm run build

      - name: Install backend dependencies
        working-directory: packages/backend
        run: npm install --no-package-lock

      - name: Backend lint
        working-directory: packages/backend
        run: npm run lint

      - name: Backend unit tests
        working-directory: packages/backend
        run: npm test -- --runInBand

      - name: Backend build
        working-directory: packages/backend
        run: npm run build

  deploy:
    name: Deploy (production)
    needs: ci
    if: github.ref == 'refs/heads/deploy' && github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch origin deploy
            git checkout deploy
            git pull --ff-only origin deploy
            docker compose -f deploy/docker-compose.yml up -d --build