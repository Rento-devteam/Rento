                  items:
                    type: string
                    format: binary
      responses:
        '201':
          description: Evidence attached
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/DisputeEvidence'

  /reports:
    get:
      tags: [Reports]
      summary: List my reports
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Report collection
          content:
            application/json:
              schema:
                type: object
                required: [items, page, pageSize, total]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Report'
                  page:
                    type: integer
                  pageSize:
                    type: integer
                  total:
                    type: integer
    post:
      tags: [Reports]
      summary: Submit a report against user, listing, review, or message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportCreateRequest'
      responses:
        '201':
          description: Report created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Report'

  /notifications:
    post:
      tags: [Internal]
      summary: Create notification event
      x-internal: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                recipientUserId:
                  type: string
                  format: uuid
                channel:
                  type: string
                  enum: [push, email, sms, in_app]
                payload:
                  type: object
                  additionalProperties: true
      responses:
        '202':
          description: Notification accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /moderation/pending:
    get:
      tags: [Moderation]
      summary: Get pending moderation queue snapshot
      responses:
        '200':
          description: Pending reports and suspicious cases
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModerationQueueResponse'
        '403':
          $ref: '#/components/responses/Forbidden'

  /moderation/queue:
    get:
      tags: [Moderation]
      summary: Search moderation queue
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
        - name: dateRange
          in: query
          schema:
            type: string
        - name: date_range
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Moderation queue
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModerationQueueResponse'

  /moderation/review/{id}:
    get:
      tags: [Moderation]
      summary: Get moderation review context
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Full moderation context
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModerationReviewContext'
        '404':
          $ref: '#/components/responses/NotFound'

  /moderation/listings/{listingId}/delete:
    post:
      tags: [Moderation]
      summary: Delete listing by moderator
      parameters:
        - $ref: '#/components/parameters/ListingId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Listing removed by moderation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /moderation/users/{userId}/block:
    post:
      tags: [Moderation]
      summary: Block user by moderator
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BlockUserRequest'
      responses:
        '200':
          description: User blocked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '409':
          $ref: '#/components/responses/Conflict'

  /moderation/reports/{reportId}/reject:
    post:
      tags: [Moderation]
      summary: Reject report
      parameters:
        - $ref: '#/components/parameters/ReportId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Report rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /moderation/users/{userId}/warn:
    post:
      tags: [Moderation]
      summary: Issue warning to user
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Warning stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /moderation/disputes/{disputeId}/resolve:
    post:
      tags: [Moderation]
      summary: Resolve dispute as moderator
      parameters:
        - $ref: '#/components/parameters/DisputeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResolveDisputeRequest'
      responses:
        '200':
          description: Dispute resolved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dispute'

  /internal/trust-score/recalculate:
    post:
      tags: [Internal]
      summary: Recalculate ARS for a user
      x-internal: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, eventType]
              properties:
                userId:
                  type: string
                  format: uuid
                eventType:
                  type: string
                  enum: [booking_completed, booking_cancelled, dispute_opened, dispute_lost, false_dispute, moderation_warning]
      responses:
        '200':
          description: Trust score recalculated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrustScore'

  /internal/users/{userId}/auto-block:
    post:
      tags: [Internal]
      summary: Auto-block user when trust score falls below threshold
      x-internal: true
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
                threshold:
                  type: number
                  format: double
      responses:
        '200':
          description: User auto-block processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    ListingId:
      name: listingId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    BookingId:
      name: bookingId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    DealId:
      name: dealId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ChatId:
      name: chatId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    DisputeId:
      name: disputeId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ReportId:
      name: reportId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or invalid token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Access denied
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: State conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        fullName:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    TelegramAuthRequest:
      type: object
      required: [telegramId]
      properties:
        telegramId:
          type: string
        username:
          type: string
          nullable: true
        firstName:
          type: string
          nullable: true
    AuthRegistrationResponse:
      type: object
      required: [userId, status, nextStep]
      properties:
        userId:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending_confirmation]
        nextStep:
          type: string
          enum: [confirm_email]
    AuthSuccessResponse:
      type: object
      required: [accessToken, user]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
          nullable: true
        user:
          $ref: '#/components/schemas/UserProfile'
    UserRole:
      type: string
      enum: [USER, MODERATOR, ADMIN]
    UserStatus:
      type: string
      enum: [ACTIVE, SUSPENDED, BANNED, DELETED]
    VerificationStatus:
      type: string
      enum: [PENDING, VERIFIED, REJECTED, EXPIRED]
    ListingStatus:
      type: string
      enum: [DRAFT, PENDING_MODERATION, ACTIVE, ARCHIVED, BLOCKED]
    AvailabilityStatus:
      type: string
      enum: [AVAILABLE, BOOKED, BLOCKED_BY_OWNER, MAINTENANCE]
    BookingStatus:
      type: string
      enum:
        - PENDING
        - PENDING_PAYMENT
        - PAYMENT_FAILED
        - CONFIRMED
        - ACTIVE
        - COMPLETED
        - CANCELLED
        - DISPUTED
    DisputeStatus:
      type: string
      enum:
        - pending
        - investigating
        - resolved
        - closed
        - OPEN
        - UNDER_REVIEW
        - RESOLVED_RENTER
        - RESOLVED_OWNER
        - RESOLVED_SPLIT
        - CLOSED
    ReportStatus:
      type: string
      enum: [CREATED, PENDING, INVESTIGATING, RESOLVED, DISMISSED, CLOSED, REJECTED]
    TransactionStatus:
      type: string
      enum: [PENDING, PROCESSING, SUCCESS, FAILED, REFUNDED]
    EscrowStatus:
      type: string
      enum: [HELD, PARTIALLY_RELEASED, FULLY_RELEASED, REFUNDED]
    UserSummary:
      type: object
      required: [id, fullName, role, status]
      properties:
        id:
          type: string
          format: uuid
        fullName:
          type: string
          nullable: true
        avatarUrl:
          type: string
          format: uri
          nullable: true
        role:
          $ref: '#/components/schemas/UserRole'
        status:
          $ref: '#/components/schemas/UserStatus'
        isVerified:
          type: boolean
    UserProfile:
      allOf:
        - $ref: '#/components/schemas/UserSummary'
        - type: object
          required: [email]
          properties:
            email:
              type: string
              format: email
              nullable: true
            phone:
              type: string
              nullable: true
            trustScore:
              $ref: '#/components/schemas/TrustScore'
    TrustScore:
      type: object
      required: [currentScore, totalDeals, successfulDeals, lateReturns, disputes, calculatedAt]
      properties:
        currentScore:
          type: number
          format: double
        totalDeals:
          type: integer
        successfulDeals:
          type: integer
        lateReturns:
          type: integer
        disputes:
          type: integer
        calculatedAt:
          type: string
          format: date-time
    BankCard:
      type: object
      required: [id, last4, cardType, isDefault]
      properties:
        id:
          type: string
          format: uuid
        last4:
          type: string
        cardType:
          type: string
        isDefault:
          type: boolean
        addedAt:
          type: string
          format: date-time
    AddCardRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
        setAsDefault:
          type: boolean
          default: false
    Category:
      type: object
      required: [id, name, slug, isActive]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        icon:
          type: string
          nullable: true
        parentId:
          type: string
          format: uuid
          nullable: true
        order:
          type: integer
        isActive:
          type: boolean
        children:
          type: array
          items:
            $ref: '#/components/schemas/Category'
    ListingPhoto:
      type: object
      required: [id, url, order, isPrimary]
      properties:
        id:
          type: string
          format: uuid
        url:
          type: string
          format: uri
        thumbnailUrl:
          type: string
          format: uri
          nullable: true
        order:
          type: integer
        isPrimary:
          type: boolean
        uploadedAt:
          type: string
          format: date-time
    ListingSummary:
      type: object
      required: [id, title, pricePerDay, depositAmount, status, owner]
      properties:
        id:
          type: string
          format: uuid
        owner:
          $ref: '#/components/schemas/UserSummary'
        categoryId:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        pricePerDay:
          type: number
          format: double
        pricePerWeek:
          type: number
          format: double
          nullable: true
        pricePerMonth:
          type: number
          format: double
          nullable: true
        depositAmount:
          type: number
          format: double
        avgRating:
          type: number
          format: double
          nullable: true
        status:
          $ref: '#/components/schemas/ListingStatus'
        primaryPhotoUrl:
          type: string
          format: uri
          nullable: true
        latitude:
          type: number
          format: double
          nullable: true
        longitude:
          type: number
          format: double
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ListingDetail:
      allOf:
        - $ref: '#/components/schemas/ListingSummary'
        - type: object
          properties:
            photos:
              type: array
              items:
                $ref: '#/components/schemas/ListingPhoto'
            category:
              $ref: '#/components/schemas/Category'
            availability:
              type: array
              items:
                $ref: '#/components/schemas/CalendarSlot'
    ListingPreview:
      type: object
      required: [id, title, pricePerDay]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        pricePerDay:
          type: number
          format: double
        depositAmount:
          type: number
          format: double
        avgRating:
          type: number
          format: double
          nullable: true
        primaryPhotoUrl:
          type: string
          format: uri
          nullable: true
        distanceMeters:
          type: integer
          nullable: true
    ListingCollectionResponse:
      type: object
      required: [items, page, pageSize, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ListingSummary'
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
    ListingCreateRequest:
      type: object
      required: [categoryId, title, description, pricePerDay, depositAmount]
      properties:
        categoryId:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        pricePerDay:
          type: number
          format: double
        pricePerWeek:
          type: number
          format: double
        pricePerMonth:
          type: number
          format: double
        depositAmount:
          type: number
          format: double
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
    ListingUpdateRequest:
      type: object
      properties:
        categoryId:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        pricePerDay:
          type: number
          format: double
        pricePerWeek:
          type: number
          format: double
        pricePerMonth:
          type: number
          format: double
        depositAmount:
          type: number
          format: double
        status:
          $ref: '#/components/schemas/ListingStatus'
    CalendarSlot:
      type: object
      required: [date, status]
      properties:
        date:
          type: string
          format: date
        status:
          $ref: '#/components/schemas/AvailabilityStatus'
        reason:
          type: string
          nullable: true
    CalendarResponse:
      type: object
      required: [listingId, items]
      properties:
        listingId:
          type: string
          format: uuid
        items:
          type: array
          items:
            $ref: '#/components/schemas/CalendarSlot'
    CalendarBlockRequest:
      type: object
      required: [startDate, endDate]
      properties:
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        reason:
          type: string
          nullable: true
    SearchRequest:
      type: object
      required: [query]
      properties:
        query:
          type: string
        filters:
          type: object
          additionalProperties: true
        page:
          type: integer
          default: 1
        pageSize:
          type: integer
          default: 20
    SearchResponse:
      type: object
      required: [items, page, pageSize, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ListingSummary'
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
        suggestion:
          type: string
          nullable: true
        emptyResults:
          type: boolean
    MapListing:
      allOf:
        - $ref: '#/components/schemas/ListingPreview'
        - type: object
          required: [latitude, longitude]
          properties:
            latitude:
              type: number
              format: double
            longitude:
              type: number
              format: double
    Recommendation:
      type: object
      required: [listing, score, type]
      properties:
        listing:
          $ref: '#/components/schemas/ListingPreview'
        score:
          type: number
          format: double
        type:
          type: string
          enum: [SIMILAR, BEST_CHOICE, NEARBY, TRENDING, PERSONALIZED]
        reason:
          type: string
    RecommendationFeedbackRequest:
      type: object
      required: [itemId, actionType]
      properties:
        itemId:
          type: string
          format: uuid
        actionType:
          type: string
          enum: [view, click, hide, book]
    FavoriteItem:
      type: object
      required: [listingId, addedAt, listing]
      properties:
        listingId:
          type: string
          format: uuid
        addedAt:
          type: string
          format: date-time
        listing:
          $ref: '#/components/schemas/ListingPreview'
    BookingSummary:
      type: object
      required: [listingId, startDate, endDate, rentalAmount, depositAmount, totalAmount]
      properties:
        listingId:
          type: string
          format: uuid
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        rentalAmount:
          type: number
          format: double
        depositAmount:
          type: number
          format: double
        totalAmount:
          type: number
          format: double
        currency:
          type: string
          default: RUB
    BookingCreateRequest:
      type: object
      required: [listingId, startDate, endDate]
      properties:
        listingId:
          type: string
          format: uuid
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        cardToken:
          type: string
          nullable: true
    Booking:
      type: object
      required:
        - id
        - listing
        - renter
        - owner
        - startDate
        - endDate
        - rentAmount
        - depositAmount
        - totalAmount
        - status
      properties:
        id:
          type: string
          format: uuid
        dealId:
          type: string
          format: uuid
          nullable: true
        listing:
          $ref: '#/components/schemas/ListingPreview'
        renter:
          $ref: '#/components/schemas/UserSummary'
        owner:
          $ref: '#/components/schemas/UserSummary'
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        rentAmount:
          type: number
          format: double
        depositAmount:
          type: number
          format: double
        totalAmount:
          type: number
          format: double
        holdId:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/BookingStatus'
        confirmedAt:
          type: string
          format: date-time
          nullable: true
        startedAt:
          type: string
          format: date-time
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true
    PaymentHoldRequest:
      type: object
      required: [amount, cardToken]
      properties:
        bookingId:
          type: string
          format: uuid
          nullable: true
        dealId:
          type: string
          format: uuid
          nullable: true
        amount:
          type: number
          format: double
        cardToken:
          type: string
      anyOf:
        - required: [bookingId]
        - required: [dealId]
    PaymentHoldResponse:
      type: object
      required: [bookingId, status, amountHeld]
      properties:
        bookingId:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/TransactionStatus'
        holdId:
          type: string
        authorizationCode:
          type: string
          nullable: true
        amountHeld:
          type: number
          format: double
    ChecklistItemSubmission:
      type: object
      required: [description]
      properties:
        description:
          type: string
        mediaIds:
          type: array
          items:
            type: string
            format: uuid
        condition:
          type: string
          enum: [GOOD, MINOR_DAMAGE, DAMAGED, MISSING]
        comment:
          type: string
          nullable: true
    ChecklistSubmission:
      type: object
      required: [type, items]
      properties:
        type:
          type: string
          enum: [TAKE, RETURN]
        items:
          type: array
          items:
            $ref: '#/components/schemas/ChecklistItemSubmission'
    ChecklistSession:
      type: object
      required: [bookingId, type, status, items]
      properties:
        bookingId:
          type: string
          format: uuid
        type:
          type: string
          enum: [TAKE, RETURN]
        status:
          type: string
          enum: [STARTED, PHOTOS_UPLOADING, PHOTOS_COMPLETE, CONFIRMED, DISPUTED, REJECTED]
        items:
          type: array
          items:
            $ref: '#/components/schemas/ChecklistItemSubmission'
    SettlementResult:
      type: object
      required: [bookingId, escrowStatus]
      properties:
        bookingId:
          type: string
