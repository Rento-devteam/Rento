openapi: 3.1.0
info:
  title: Rento API
  version: 0.1.0
  summary: Draft API contract generated from project documentation and UML use cases.
  description: |
    This OpenAPI draft was derived from the documentation in `docs/`.

    Main alignment decisions:
    - `deal` and `booking` flows are unified under the `Booking` resource.
    - authentication is modeled as Bearer token based, although the docs mention both sessions and tokens.
    - favorites are scoped to the authenticated user even where the UML uses `user_id` in query/body.
    - public, authenticated, moderation, and internal endpoints are separated by tags.

    The file is intended as a practical baseline for backend/frontend development and can be tightened later.
servers:
  - url: http://localhost:8080/api/v1
    description: Local development
tags:
  - name: Auth
  - name: Verification
  - name: Payment Methods
  - name: Categories
  - name: Listings
  - name: Search
  - name: Recommendations
  - name: Favorites
  - name: Bookings
  - name: Payments
  - name: Chat
  - name: Media
  - name: Reviews
  - name: Disputes
  - name: Reports
  - name: Moderation
  - name: Internal
security:
  - BearerAuth: []
paths:
  /register:
    post:
      tags: [Auth]
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Account created in pending confirmation state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthRegistrationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /confirm-email:
    get:
      tags: [Auth]
      summary: Confirm email by token
      security: []
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Email confirmed and account activated for email/password login; Telegram linking remains optional
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /resend-confirmation:
    post:
      tags: [Auth]
      summary: Resend email confirmation link
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '201':
          description: Confirmation email resent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /login:
    post:
      tags: [Auth]
      summary: Sign in by email and password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '201':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /complete-registration:
    get:
      tags: [Auth]
      summary: Get registration completion state for email confirmation flow
      security: []
      parameters:
        - name: email
          in: query
          required: true
          schema:
            type: string
            format: email
      responses:
        '200':
          description: Registration completion status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [completed, pending_email_confirmation]
                  nextStep:
                    type: string
                    nullable: true

  /telegram/link:
    post:
      tags: [Auth]
      summary: Generate Telegram linking code for an authenticated email-confirmed account
      requestBody:
        required: false
      responses:
        '201':
          description: Linking instructions
          content:
            application/json:
              schema:
                type: object
                required: [code, deepLink]
                properties:
                  code:
                    type: string
                  deepLink:
                    type: string
                    format: uri
                  qrCodeUrl:
                    type: string
                    format: uri
                    nullable: true
        '401':
          $ref: '#/components/responses/Unauthorized'

  /telegram/verify:
    post:
      tags: [Auth]
      summary: Verify Telegram link code
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, telegramId]
              properties:
                code:
                  type: string
                telegramId:
                  type: string
      responses:
        '201':
          description: Telegram linked and account activated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /telegram/auth:
    post:
      tags: [Auth]
      summary: Register or sign in using Telegram identity
      security: []
      parameters:
        - name: x-bot-secret
          in: header
          required: true
          schema:
            type: string
          description: Shared secret used by Telegram bot backend
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TelegramAuthRequest'
      responses:
        '201':
          description: Telegram-authenticated account session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /verify/esia/initiate:
    post:
      tags: [Verification]
      summary: Start ESIA verification
      responses:
        '200':
          description: ESIA redirect generated
          content:
            application/json:
              schema:
                type: object
                required: [redirectUrl]
                properties:
                  redirectUrl:
                    type: string
                    format: uri
        '401':
          $ref: '#/components/responses/Unauthorized'

  /verify/esia/callback:
    get:
      tags: [Verification]
      summary: Handle ESIA callback
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: error
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Verification callback processed
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    $ref: '#/components/schemas/VerificationStatus'
                  trustScore:
                    $ref: '#/components/schemas/TrustScore'
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'

  /verify/esia/escalate:
    post:
      tags: [Verification]
      summary: Escalate failed verification for manual review
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
                comment:
                  type: string
      responses:
        '202':
          description: Verification escalation accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /payment/methods:
    get:
      tags: [Payment Methods]
      summary: List saved payment methods
      responses:
        '200':
          description: Saved cards
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/BankCard'

  /payment/cards/add:
    post:
      tags: [Payment Methods]
      summary: Add tokenized payment card
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddCardRequest'
      responses:
        '201':
          description: Card added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BankCard'
        '400':
          $ref: '#/components/responses/BadRequest'

  /users/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      tags: [Auth]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fullName:
                  type: string
                phone:
                  type: string
                avatarUrl:
                  type: string
                  format: uri
      responses:
        '200':
          description: Current user profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'

  /users/me/trust-score:
    get:
      tags: [Verification]
      summary: Get current user trust score
      responses:
        '200':
          description: Trust score snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrustScore'

  /user/{userId}/activity:
    get:
      tags: [Recommendations]
      summary: Get user activity used by recommendation engine
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Activity profile for recommendations
          content:
            application/json:
              schema:
                type: object
                properties:
                  searches:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  viewedListings:
                    type: array
                    items:
                      type: string
                      format: uuid
                  favoriteListings:
                    type: array
                    items:
                      type: string
                      format: uuid
                  bookings:
                    type: array
                    items:
                      type: string
                      format: uuid

  /categories:
    get:
      tags: [Categories]
      summary: List active categories
      security: []
      responses:
        '200':
          description: Category tree
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Category'

  /listings/create:
    get:
      tags: [Listings]
      summary: Get metadata required to create a listing
      responses:
        '200':
          description: Form metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  categories:
                    type: array
                    items:
                      $ref: '#/components/schemas/Category'
                  priceRules:
                    type: object
                    additionalProperties: true
                  limits:
                    type: object
                    properties:
                      maxPhotos:
                        type: integer
                        example: 10

  /listings:
    get:
      tags: [Listings]
      summary: List listings
      security: []
      parameters:
        - name: categoryId
          in: query
          schema:
            type: string
            format: uuid
        - name: ownerId
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/ListingStatus'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Listing collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingCollectionResponse'
    post:
      tags: [Listings]
      summary: Create a new listing draft
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListingCreateRequest'
      responses:
        '201':
          description: Listing draft created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingDetail'
        '400':
          $ref: '#/components/responses/BadRequest'

  /listings/{listingId}:
    get:
      tags: [Listings]
      summary: Get listing details
      security: []
      parameters:
        - $ref: '#/components/parameters/ListingId'
      responses:
        '200':
          description: Listing details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingDetail'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Listings]
      summary: Update listing draft or active listing
      parameters:
        - $ref: '#/components/parameters/ListingId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListingUpdateRequest'
      responses:
        '200':
          description: Listing updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingDetail'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Listings]
      summary: Archive or delete own listing
      parameters:
        - $ref: '#/components/parameters/ListingId'
      responses:
        '204':
          description: Listing removed from active inventory
        '404':
          $ref: '#/components/responses/NotFound'

  /listings/{listingId}/photos:
    get:
      tags: [Listings]
      summary: List listing photos
      security: []
      parameters:
        - $ref: '#/components/parameters/ListingId'
      responses:
        '200':
          description: Listing photos
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/ListingPhoto'
    post:
      tags: [Listings]
      summary: Upload a listing photo
      parameters:
        - $ref: '#/components/parameters/ListingId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                isPrimary:
                  type: boolean
                order:
                  type: integer
      responses:
        '201':
          description: Photo uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingPhoto'
        '400':
          $ref: '#/components/responses/BadRequest'

  /listings/{listingId}/publish:
    post:
      tags: [Listings]
      summary: Publish listing or send it to moderation
      parameters:
        - $ref: '#/components/parameters/ListingId'
      responses:
        '200':
          description: Listing status changed
          content:
            application/json:
              schema:
                type: object
                required: [id, status]
                properties:
                  id:
                    type: string
                    format: uuid
                  status:
                    $ref: '#/components/schemas/ListingStatus'

  /listings/{listingId}/calendar:
    get:
      tags: [Listings]
      summary: Get listing calendar with booking and owner blocks
      security: []
      parameters:
        - $ref: '#/components/parameters/ListingId'
        - name: start
          in: query
          schema:
            type: string
            format: date
        - name: end
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Calendar items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalendarResponse'

  /listings/{listingId}/bookings:
    get:
      tags: [Bookings]
      summary: List bookings for listing calendar merge
      parameters:
        - $ref: '#/components/parameters/ListingId'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/BookingStatus'
      responses:
        '200':
          description: Bookings for selected listing
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Booking'

  /listings/{listingId}/dates/availability:
    get:
      tags: [Listings]
      summary: Check availability for date range
      security: []
      parameters:
        - $ref: '#/components/parameters/ListingId'
        - name: start
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: end
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Availability result
          content:
            application/json:
              schema:
                type: object
                required: [available]
                properties:
                  available:
                    type: boolean
                  conflicts:
                    type: array
                    items:
                      $ref: '#/components/schemas/CalendarSlot'

  /listings/{listingId}/calendar/block:
    post:
      tags: [Listings]
      summary: Block listing dates as owner
      parameters:
        - $ref: '#/components/parameters/ListingId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CalendarBlockRequest'
      responses:
        '200':
          description: Dates blocked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalendarResponse'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      tags: [Listings]
      summary: Unblock listing dates
      parameters:
        - $ref: '#/components/parameters/ListingId'
        - name: start
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: end
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: force
          in: query
          schema:
            type: boolean
            default: false
        - name: cancelBookings
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Dates unblocked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalendarResponse'
        '409':
          $ref: '#/components/responses/Conflict'

  /search:
    get:
      tags: [Search]
      summary: Search listings with text and filters
      security: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: categoryId
          in: query
          schema:
            type: string
            format: uuid
        - name: minPrice
          in: query
          schema:
            type: number
        - name: maxPrice
          in: query
          schema:
            type: number
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
    post:
      tags: [Search]
      summary: Search listings using complex filter payload
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchRequest'
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'

  /suggest:
    get:
      tags: [Search]
      summary: Get text search suggestions
      security: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Suggestion list
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      type: string

  /search/autocomplete:
    get:
      tags: [Search]
      summary: Autocomplete search phrase
      security: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Autocomplete options
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      type: string

  /listings/map:
    get:
      tags: [Search]
      summary: Get listings within map bounds
      security: []
      parameters:
        - name: bounds
          in: query
          required: true
          schema:
            type: string
          description: NE,SW coordinate pair
        - name: zoom
          in: query
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Listings for map rendering
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/MapListing'

  /listings/{listingId}/preview:
    get:
      tags: [Search]
      summary: Get compact listing preview for map card
      security: []
      parameters:
        - $ref: '#/components/parameters/ListingId'
      responses:
        '200':
          description: Listing preview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingPreview'
        '404':
          $ref: '#/components/responses/NotFound'

  /recommendations/personalized:
    get:
      tags: [Recommendations]
      summary: Get personalized recommendations
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 12
      responses:
        '200':
          description: Recommended listings
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Recommendation'
                  fallback:
                    type: boolean

  /recommendations/feedback:
    post:
      tags: [Recommendations]
      summary: Send recommendation feedback event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecommendationFeedbackRequest'
      responses:
        '202':
          description: Feedback accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /favorites/check:
    get:
      tags: [Favorites]
      summary: Check if listing is in favorites
      parameters:
        - name: listingId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Favorite state
          content:
            application/json:
              schema:
                type: object
                required: [listingId, isFavorited]
                properties:
                  listingId:
                    type: string
                    format: uuid
                  isFavorited:
                    type: boolean

  /favorites:
    get:
      tags: [Favorites]
      summary: List my favorite listings
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Favorite items
          content:
            application/json:
              schema:
                type: object
                required: [items, page, pageSize, total]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/FavoriteItem'
                  page:
                    type: integer
                  pageSize:
                    type: integer
                  total:
                    type: integer
    post:
      tags: [Favorites]
      summary: Add listing to favorites
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [listingId]
              properties:
                listingId:
                  type: string
                  format: uuid
      responses:
        '201':
          description: Favorite created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FavoriteItem'
    delete:
      tags: [Favorites]
      summary: Remove a single favorite
      parameters:
        - name: listingId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Favorite removed

  /favorites/batch:
    delete:
      tags: [Favorites]
      summary: Remove multiple favorites
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [listingIds]
              properties:
                listingIds:
                  type: array
                  items:
                    type: string
                    format: uuid
      responses:
        '204':
          description: Favorites removed

  /listings/{listingId}/booking-summary:
    get:
      tags: [Bookings]
      summary: Calculate booking price breakdown for dates
      parameters:
        - $ref: '#/components/parameters/ListingId'
        - name: start_date
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Booking quote
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingSummary'
        '409':
          $ref: '#/components/responses/Conflict'

  /bookings:
    get:
      tags: [Bookings]
      summary: List my bookings
      parameters:
