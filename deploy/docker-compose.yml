name: rento

services:
  caddy:
    image: caddy:2.8-alpine
    container_name: rento-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - ./.env
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - rento_caddy_data:/data
      - rento_caddy_config:/config
    depends_on:
      - backend
      - frontend
      - telegram-bot
    networks:
      - web
      - internal

  backend:
    build:
      context: ../packages
      dockerfile: backend/Dockerfile
    container_name: rento-backend
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      ELASTICSEARCH_NODE: http://elasticsearch:9200
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - internal
      - web
    dns:
      - 85.193.93.193
      - 85.193.93.194

    dns_opt:
      - use-vc
      - timeout:2
      - attempts:2
      - ndots:0

  frontend:
    build:
      context: ../packages
      dockerfile: frontend/Dockerfile
    container_name: rento-frontend
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
    networks:
      - internal

  telegram-bot:
    build:
      context: ../packages
      dockerfile: telegram-bot/Dockerfile
    container_name: rento-telegram-bot
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
      PORT: ${TELEGRAM_BOT_PORT:-3010}
      WEBHOOK_PATH: ${TELEGRAM_BOT_WEBHOOK_PATH:-/telegram/webhook}
      PUBLIC_BOT_BASE_URL: ${TELEGRAM_BOT_PUBLIC_BASE_URL}
      SET_WEBHOOK_ON_STARTUP: ${TELEGRAM_BOT_SET_WEBHOOK_ON_STARTUP:-true}
      USE_POLLING: ${TELEGRAM_BOT_USE_POLLING:-false}
      BOT_TOKEN: ${BOT_TOKEN}
      BOT_SECRET: ${BOT_SECRET}
      BACKEND_BASE_URL: http://backend:3000
    depends_on:
      - backend
    networks:
      - web
      - internal
    dns:
      - 77.88.8.8
      - 1.1.1.1
      - 8.8.8.8

  postgres:
    image: postgres:16-alpine
    container_name: rento-postgres
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - rento_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.4
    container_name: rento-elasticsearch
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - rento_es_data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s
    networks:
      - internal

volumes:
  rento_pg_data:
  rento_es_data:
  rento_caddy_data:
  rento_caddy_config:

networks:
  web:
  internal:
    internal: true

