services:
  postgres:
    image: postgres:16-alpine
    container_name: rento-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: rento
    # Host 5433 avoids clashing with a local PostgreSQL install on 5432 (common on dev machines).
    ports:
      - '5433:5432'
    volumes:
      - rento_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d rento']
      interval: 5s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.4
    container_name: rento-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - 'ES_JAVA_OPTS=-Xms512m -Xmx512m'
    ports:
      - '9200:9200'
    volumes:
      - rento_es_data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'curl -sf http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s || exit 1',
        ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s

volumes:
  rento_pg_data:
  rento_es_data:
